0005], [21.77505000000002, 42.68270000000001], [21.54332000000005, 42.3202500000001], [21.57663598940212, 42.24522439706186], [20.762159999999994, 42.05186000000003], [20.71731000000011, 41.84711000000004], [20.590246546680227, 41.855408919283626], [20.522950000000037, 42.21787000000006]]]}}]}, "meta": {"sentiment_source": "BiHa 5.xlsx", "route_source": "jsonl_sea_sentiment_geolinks_v1.csv", "notes": "Approximate polygons added for historical/regional entities where feasible. City markers use representative points."}};
const SVG_W = 1200, SVG_H = 720;
const [MIN_LON, MIN_LAT, MAX_LON, MAX_LAT] = DATA.bbox;
const bg = document.getElementById('bg'), areas = document.getElementById('areas'), routes = document.getElementById('routes'), markers = document.getElementById('markers'), labels = document.getElementById('labels');
const tip = document.getElementById('tooltip');
const boundsByName = new Map();

function project(coord) {
  const [lon, lat] = coord;
  const x = (lon - MIN_LON) / (MAX_LON - MIN_LON) * SVG_W;
  const y = SVG_H - (lat - MIN_LAT) / (MAX_LAT - MIN_LAT) * SVG_H;
  return [x,y];
}
function colorForSentiment(v) {
  if (v <= -0.6) return '#9e0142';
  if (v <= -0.35) return '#d73027';
  if (v <= -0.1) return '#f46d43';
  if (v < 0.1) return '#fee08b';
  if (v < 0.35) return '#66bd63';
  return '#1a9850';
}
function radiusForCount(n) { return Math.max(4, Math.min(20, 5 + Math.sqrt(n)/3)); }
function geomToPath(geom) {
  const polys = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;
  return polys.map(poly => poly.map((ring, idx) => ring.map((c,i) => `${i===0?'M':'L'}${project(c)[0].toFixed(1)},${project(c)[1].toFixed(1)}`).join(' ') + ' Z').join(' ')).join(' ');
}
function lineToPath(coords) { return coords.map((c,i) => `${i===0?'M':'L'}${project(c)[0].toFixed(1)},${project(c)[1].toFixed(1)}`).join(' '); }
function htmlFor(d) {
  return `<div style="font-weight:700;font-size:15px;margin-bottom:4px">${d.name}</div>
  <div class="muted">${d.category} · ${d.sentence_total} sentences · avg sentiment <b>${d.avg_sentiment.toFixed(2)}</b></div>
  <div style="margin-top:8px">Sentiment spread (positive / negative / mixed)</div>
  <div class="spread"><div class="pos" style="width:${d.spread.positive_pct}%"></div><div class="neg" style="width:${d.spread.negative_pct}%"></div><div class="mix" style="width:${d.spread.mixed_pct}%"></div></div>
  <div class="muted">Positive: ${d.positive} | Negative: ${d.negative} | Mixed: ${d.mixed} | Neutral: ${d.neutral}</div>`;
}
function routeHtml(r) {
  return `<div style="font-weight:700;font-size:15px;margin-bottom:4px">${r.source} → ${r.target}</div><div class="muted">Shared IE count: <b>${r.ie_count}</b><br>Examples: ${r.ies.join(', ')}</div>`;
}
function showTip(html) { tip.innerHTML = html; tip.style.display = 'block'; }

DATA.background.features.forEach(f => {
  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d', geomToPath(f.geometry));
  p.setAttribute('class','country-bg');
  bg.appendChild(p);
});

DATA.entries.forEach(d => {
  document.getElementById('focusList').insertAdjacentHTML('beforeend', `<option value="${d.name}"></option>`);
  if (d.geometry) {
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', geomToPath(d.geometry));
    p.setAttribute('class', 'entity-area');
    p.setAttribute('fill', colorForSentiment(d.avg_sentiment));
    p.setAttribute('stroke', colorForSentiment(d.avg_sentiment));
    p.addEventListener('mouseenter', () => showTip(htmlFor(d)));
    p.addEventListener('click', () => showTip(htmlFor(d)));
    areas.appendChild(p);
  }
  if (d.line) {
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', lineToPath(d.line));
    p.setAttribute('fill','none');
    p.setAttribute('stroke', colorForSentiment(d.avg_sentiment));
    p.setAttribute('stroke-width','3');
    p.setAttribute('stroke-dasharray','5,5');
    p.addEventListener('mouseenter', () => showTip(htmlFor(d)));
    p.addEventListener('click', () => showTip(htmlFor(d)));
    areas.appendChild(p);
  }
  const [x,y] = project(d.point);
  const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx', x); c.setAttribute('cy', y); c.setAttribute('r', radiusForCount(d.sentence_total));
  c.setAttribute('class', 'marker'); c.setAttribute('fill', colorForSentiment(d.avg_sentiment));
  c.addEventListener('mouseenter', () => showTip(htmlFor(d)));
  c.addEventListener('click', () => showTip(htmlFor(d)));
  markers.appendChild(c);
  if (d.sentence_total >= 450) {
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', x + 6); t.setAttribute('y', y - 8); t.setAttribute('class','label');
    t.textContent = d.name;
    labels.appendChild(t);
  }
  boundsByName.set(d.name, [x,y]);
});

function renderRoutes() {
  routes.innerHTML = '';
  const threshold = +document.getElementById('threshold').value;
  document.getElementById('thresholdVal').textContent = threshold;
  let n = 0;
  DATA.links.filter(r => r.ie_count >= threshold).forEach(r => {
    n += 1;
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', lineToPath(r.coords));
    p.setAttribute('class', 'route');
    p.setAttribute('stroke-width', Math.min(7, 1 + r.ie_count / 8));
    p.addEventListener('mouseenter', () => showTip(routeHtml(r)));
    p.addEventListener('click', () => showTip(routeHtml(r)));
    routes.appendChild(p);
  });
  document.getElementById('routeInfo').textContent = `${n} visible routes of ${DATA.links.length} total links.`;
}
renderRoutes();

document.getElementById('threshold').addEventListener('input', renderRoutes);
document.getElementById('areasToggle').addEventListener('change', e => areas.style.display = e.target.checked ? '' : 'none');
document.getElementById('markersToggle').addEventListener('change', e => { markers.style.display = e.target.checked ? '' : 'none'; labels.style.display = e.target.checked ? '' : 'none'; });
document.getElementById('routesToggle').addEventListener('change', e => routes.style.display = e.target.checked ? '' : 'none');
document.getElementById('focus').addEventListener('change', e => {
  const pt = boundsByName.get(e.target.value);
  if (!pt) return;
  const [x,y] = pt;
  const svg = document.getElementById('svg');
  svg.setAttribute('viewBox', `${Math.max(0,x-240)} ${Math.max(0,y-160)} 480 320`);
});

document.getElementById('stage').addEventListener('dblclick', () => document.getElementById('svg').setAttribute('viewBox','0 0 1200 720'));
</script>
